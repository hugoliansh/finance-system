<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财务对账系统</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;margin:20px;background:#f5f7fa}
.container{max-width:1300px;margin:0 auto;background:white;padding:20px;border-radius:8px;box-shadow:0 0 20px rgba(0,0,0,0.1)}
h1,h2,h3{color:#333}
.form-group{margin:15px 0}
label{display:inline-block;width:120px;font-weight:bold}
input,select{padding:8px;width:220px;border:1px solid #ddd;border-radius:4px}
button{padding:8px 16px;background:#007bff;color:white;border:none;border-radius:4px;cursor:pointer;margin-right:5px}
button:hover{background:#0056b3}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:10px;border:1px solid #ddd;text-align:left}
th{background:#f8f9fa}
.summary{background:#e9f7ef;padding:15px;border-radius:4px;margin:20px 0;white-space:pre-line}
.top-report{position:absolute;top:80px;right:20px;background:white;padding:15px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.user-info{text-align:right;margin-bottom:60px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999}
.modal-body{width:400px;background:white;margin:120px auto;padding:30px;border-radius:10px}
</style>
</head>
<body>
<div class="user-info">
    欢迎：<span id="userName"></span>
    <button onclick="logout()">退出登录</button>
    <button id="addUserBtn" style="display:none;background:#28a745" onclick="showAddUser()">新增用户</button>
    <button id="importBtn" style="display:none;background:#17a2b8" onclick="document.getElementById('importFile').click()">导入Excel</button>
    <input type="file" id="importFile" style="display:none" accept=".xlsx,.xls" onchange="importExcel(event)">
</div>

<div class="top-report">
    <h3>财务报表</h3>
    <div class="form-group">
        <label>月份：</label>
        <input type="month" id="monthQuery" style="width:140px">
        <button onclick="showMonthDetail()">月度明细</button>
    </div>
    <div class="form-group">
        <label>年份：</label>
        <input type="number" id="yearInput" placeholder="2025" style="width:70px">
        <input type="number" id="yearRent" placeholder="全年租金" style="width:120px">
        <button onclick="genYearReport()">年度财报</button>
    </div>
</div>

<div id="reportModal" class="modal">
    <div style="background:white;margin:5% auto;padding:20px;width:80%;max-width:1000px;border-radius:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <h2 id="reportTitle"></h2>
            <div>
                <button onclick="closeReport()">关闭</button>
            </div>
        </div>
        <div id="reportContent" style="max-height:600px;overflow:auto;"></div>
    </div>
</div>

<div id="addUserModal" class="modal">
    <div class="modal-body">
        <h3>新增用户</h3>
        <div class="form-group">
            <label>用户名</label><input type="text" id="newUser">
        </div>
        <div class="form-group">
            <label>密码</label><input type="password" id="newPwd">
        </div>
        <button onclick="doAddUser()" class="login-btn">保存</button>
        <button onclick="hideAddUser()" class="sec-btn">取消</button>
    </div>
</div>

<div class="container">
    <h1>财务对账系统</h1>
    <div class="summary" id="capitalProgress"></div>

    <h2>数据录入</h2>
    <div class="form-group"><label>日期：</label><input type="date" id="payDate" required></div>
    <div class="form-group">
        <label>类型：</label>
        <select id="recordType" onchange="refreshForm()">
            <option value="收入">收入</option><option value="支出">支出</option><option value="转账">转账</option>
        </select>
    </div>
    <div class="form-group" id="expenseTypeGroup" style="display:none;">
        <label>支出大类：</label>
        <select id="expenseMain" onchange="refreshSubCategory()">
            <option value="人事支出">人事支出</option><option value="市场支出">市场支出</option>
            <option value="行政支出">行政支出</option><option value="管理支出">管理支出</option>
            <option value="场地支出">场地支出</option><option value="财务支出">财务支出</option>
            <option value="预付款">预付款</option>
        </select>
        <label style="width:80px;">小类：</label><select id="expenseSub"></select>
    </div>
    <div class="form-group" id="belongMonthGroup" style="display:none;">
        <label>归属月份：</label><input type="month" id="belongMonth">
    </div>
    <div class="form-group"><label>支付/转出：</label>
        <select id="channel">
            <option value="支付宝">支付宝</option><option value="微信">微信</option>
            <option value="兴业银行">兴业银行</option><option value="公司账户">公司账户</option>
        </select>
    </div>
    <div class="form-group" id="toChannelGroup" style="display:none;">
        <label>转入账户：</label>
        <select id="toChannel">
            <option value="支付宝">支付宝</option><option value="微信">微信</option>
            <option value="兴业银行">兴业银行</option><option value="公司账户">公司账户</option>
        </select>
    </div>
    <div class="form-group"><label>金额：</label><input type="number" id="amount" step="0.01" required></div>
    <div class="form-group"><label>备注：</label><input type="text" id="remark" placeholder=""></div>
    <button onclick="addRecord()">保存</button>

    <h2>查询对账</h2>
    <div class="form-group">
        <label>查询日期：</label><input type="date" id="queryDate">
        <button onclick="queryDaily()">当日对账汇总</button>
        <button onclick="queryBalance()">当日账户余额</button>
    </div>
    <div class="summary" id="summaryResult"></div>

    <h2>流水记录</h2>
    <table>
        <thead>
            <tr>
                <th>日期</th><th>类型</th><th>分类</th><th>账户</th><th>转入</th><th>金额</th><th>操作人</th>
                <th id="opTimeHeader" style="display:none;">操作时间</th><th>备注</th>
            </tr>
        </thead>
        <tbody id="recordBody"></tbody>
    </table>

    <div class="bottom-bar" style="margin-top:20px;padding-top:20px;border-top:1px solid #ddd">
        <div class="form-group">
            <label>导出区间：</label>
            <input type="date" id="exportStart"> ~ <input type="date" id="exportEnd">
            <button onclick="exportRangeRecords()" style="background:#17a2b8">导出流水Excel</button>
        </div>
        <button onclick="showEditInitial()" style="background:#28a745">修改初始投入</button>
    </div>
</div>

<script>
// ==============================================
// 【核心修复：用你第一次成功的 Master Key 配置】
// ==============================================
const API_KEY = "$2a$10$hNOU1jfJH8FC5ykplAHICOEQTs8InWsAt72BFVWLfbftzu5tI9s0W";
const DATA_BIN_ID = "69cf5a1d36566621a875742d";
const USER_BIN_ID = "69cfc20e856a682189f79bb9";
const DATA_BIN_URL = `https://api.jsonbin.io/v3/b/${DATA_BIN_ID}/latest`;
const USER_BIN_URL = `https://api.jsonbin.io/v3/b/${USER_BIN_ID}/latest`;

let currentUser = localStorage.getItem("user");
let records = [];
let initialCapital = 0;

const expenseCategories = {
    "人事支出":["薪资-基本薪酬","薪资-业绩奖励","团建","培训","招聘"],
    "市场支出":["网络","渠道","地推","物资制作","人员工资"],
    "行政支出":["办公用品","耗材","修缮","通讯","报销"],
    "管理支出":["管理费","教学用品","活动","招生费"],
    "场地支出":["场地租金","后勤","修缮"],
    "财务支出":["税费","手续费"],
    "预付款":["场地预付","广告预付"]
};

// ==============================================
// 【修复1：用 Master Key 读写，彻底解决 401】
// ==============================================
async function loadData() {
    try {
        // 强制用 Master Key 读取，100% 有权限
        let res = await fetch(DATA_BIN_URL, {
            headers: { "X-Master-Key": API_KEY }
        });
        let data = await res.json();
        // 【修复2：兼容旧数据结构，自动映射字段】
        let loadedRecords = data.record?.records || data.record || [];
        // 把旧数据的 payDate 自动转为 date，保证新老数据兼容
        loadedRecords = loadedRecords.map(r => ({
            ...r,
            date: r.date || r.payDate, // 兼容旧字段
            payDate: r.payDate || r.date,
            operateTime: r.operateTime || new Date().toLocaleString(),
            isDividend: r.isDividend || (r.remark?.includes("分红") || false)
        }));
        return {
            records: loadedRecords,
            initialCapital: data.record?.initialCapital || 0
        };
    } catch (e) {
        console.error("加载数据失败", e);
        return { records: [], initialCapital: 0 };
    }
}

async function saveData(data) {
    try {
        await fetch(`https://api.jsonbin.io/v3/b/${DATA_BIN_ID}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "X-Master-Key": API_KEY // 强制用 Master Key 写入
            },
            body: JSON.stringify(data)
        });
        return true;
    } catch (e) {
        alert("保存数据失败：" + e.message);
        return false;
    }
}

// ==============================================
// 【用户管理：同样用 Master Key，解决权限问题】
// ==============================================
async function getUsers() {
    try {
        let res = await fetch(USER_BIN_URL, {
            headers: { "X-Master-Key": API_KEY }
        });
        let data = await res.json();
        return data.record || { admin: "admin123", simon: "simon123" };
    } catch (e) {
        return { admin: "admin123", simon: "simon123" };
    }
}

async function saveUsers(users) {
    try {
        await fetch(`https://api.jsonbin.io/v3/b/${USER_BIN_ID}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "X-Master-Key": API_KEY
            },
            body: JSON.stringify(users)
        });
        return true;
    } catch (e) {
        alert("保存用户失败");
        return false;
    }
}

// ==============================================
// 初始化
// ==============================================
window.onload = async () => {
    if (!currentUser) { location.href = "index.html"; return; }
    document.getElementById("userName").innerText = currentUser;

    // admin 显示按钮
    if (currentUser === "admin") {
        document.getElementById("opTimeHeader").style.display = "table-cell";
        document.getElementById("addUserBtn").style.display = "inline-block";
        document.getElementById("importBtn").style.display = "inline-block";
    }

    // 加载云端数据（现在100%能读到旧数据）
    const cloud = await loadData();
    records = cloud.records || [];
    initialCapital = cloud.initialCapital || 0;
    refreshAll();
};

function logout() {
    localStorage.clear();
    location.href = "index.html";
}

function refreshForm() {
    const type = document.getElementById("recordType").value;
    const main = document.getElementById("expenseMain")?.value;
    document.getElementById("expenseTypeGroup").style.display = type === "支出" ? "block" : "none";
    document.getElementById("toChannelGroup").style.display = type === "转账" ? "block" : "none";

    const showBelong = type === "支出" && ["人事支出","场地支出","预付款"].includes(main);
    document.getElementById("belongMonthGroup").style.display = showBelong ? "block" : "none";
    if (type === "支出") refreshSubCategory();
}

function refreshSubCategory() {
    const main = document.getElementById("expenseMain").value;
    const sub = document.getElementById("expenseSub");
    sub.innerHTML = "";
    (expenseCategories[main] || []).forEach(s => {
        const opt = document.createElement("option");
        opt.value = s; opt.innerText = s;
        sub.appendChild(opt);
    });
}

async function showEditInitial() {
    const v = prompt("初始投入", initialCapital);
    if (v == null) return;
    initialCapital = Number(v) || 0;
    await saveData({ records, initialCapital });
    refreshAll();
}

function refreshAll() {
    renderList();
    updateProgress();
}

function updateProgress() {
    let profit = 0;
    records.forEach(r => {
        if (r.type === "转账") return;
        if (r.isDividend || r.remark?.includes("分红")) return;
        // 兼容旧数据的 adjustment 字段
        const finalAmount = r.amount + (r.adjustment || 0);
        profit += r.type === "收入" ? finalAmount : -finalAmount;
    });
    document.getElementById("capitalProgress").innerText =
        `初始：${initialCapital.toFixed(2)} | 利润：${profit.toFixed(2)}`;
}

async function addRecord() {
    const date = document.getElementById("payDate").value;
    const type = document.getElementById("recordType").value;
    const amount = Number(document.getElementById("amount").value);
    if (!date || !amount) { alert("请填完整"); return; }

    const main = document.getElementById("expenseMain")?.value;
    const sub = document.getElementById("expenseSub")?.value;
    const r = {
        payDate: date, // 兼容旧结构
        date: date,
        type: type,
        category: type === "支出" ? `${main}-${sub}` : "",
        belongMonth: document.getElementById("belongMonth").value || "",
        channel: document.getElementById("channel").value,
        toChannel: document.getElementById("toChannel")?.value || "",
        amount: amount,
        adjustment: 0, // 兼容旧结构
        remark: document.getElementById("remark").value,
        operator: currentUser,
        operateTime: new Date().toLocaleString(),
        isDividend: document.getElementById("remark").value.includes("分红")
    };

    records.unshift(r);
    const ok = await saveData({ records, initialCapital });
    if (ok) {
        refreshAll();
        alert("保存成功");
    }
}

function renderList() {
    const b = document.getElementById("recordBody");
    b.innerHTML = "";
    records.forEach(r => {
        const op = currentUser === "admin" ? `<td>${r.operateTime}</td>` : "";
        b.innerHTML += `<tr>
<td>${r.date || r.payDate}</td><td>${r.type}</td><td>${r.category||"-"}</td>
<td>${r.channel}</td><td>${r.toChannel||"-"}</td><td>${r.amount.toFixed(2)}</td>
<td>${r.operator}</td>${op}<td>${r.remark}</td></tr>`;
    });
}

function queryDaily() {
    const d = document.getElementById("queryDate").value;
    const list = records.filter(x => (x.date || x.payDate) === d);
    let inSum = 0, outSum = 0;
    list.forEach(r => {
        if (r.type === "转账" || r.isDividend || r.remark?.includes("分红")) return;
        const finalAmount = r.amount + (r.adjustment || 0);
        r.type === "收入" ? inSum += finalAmount : outSum += finalAmount;
    });
    document.getElementById("summaryResult").innerText =
        `${d}\n收入：${inSum.toFixed(2)}\n支出：${outSum.toFixed(2)}\n净额：${(inSum-outSum).toFixed(2)}`;
}

function queryBalance() {
    const d = document.getElementById("queryDate").value;
    const list = records.filter(x => (x.date || x.payDate) <= d);
    const bal = {支付宝:0,微信:0,兴业银行:0,公司账户:0,刷卡:0}; // 兼容你截图里的刷卡账户
    list.forEach(r => {
        const finalAmount = r.amount + (r.adjustment || 0);
        if (r.type === "收入") bal[r.channel] += finalAmount;
        if (r.type === "支出") bal[r.channel] -= finalAmount;
        if (r.type === "转账") { bal[r.channel] -= finalAmount; bal[r.toChannel] += finalAmount; }
    });
    const total = Object.values(bal).reduce((a,b)=>a+b,0);
    document.getElementById("summaryResult").innerText =
`截至${d}
支付宝：${bal.支付宝.toFixed(2)}
微信：${bal.微信.toFixed(2)}
兴业银行：${bal.兴业银行.toFixed(2)}
公司账户：${bal.公司账户.toFixed(2)}
刷卡：${bal.刷卡.toFixed(2)}
合计：${total.toFixed(2)}`;
}

// 月度明细：优先按归属月查询
function showMonthDetail() {
    const m = document.getElementById("monthQuery").value;
    const list = records.filter(x => x.belongMonth === m || (x.date || x.payDate).startsWith(m));
    let inSum=0, outSum=0;
    list.forEach(r => {
        if (r.type === "转账" || r.isDividend || r.remark?.includes("分红")) return;
        const finalAmount = r.amount + (r.adjustment || 0);
        r.type === "收入" ? inSum += finalAmount : outSum += finalAmount;
    });
    document.getElementById("reportContent").innerHTML =
        `<h3>${m} 月度明细</h3>
        <p>收入：${inSum.toFixed(2)}</p>
        <p>支出：${outSum.toFixed(2)}</p>
        <p>净利：${(inSum-outSum).toFixed(2)}</p>
        <table border=1 cellpadding=5 width=100% style="border-collapse:collapse">
            <tr bgcolor=#eee>
                <th>日期</th><th>归属月</th><th>类型</th><th>分类</th><th>渠道</th><th>金额</th><th>操作人</th><th>备注</th>
            </tr>`;
    list.forEach(r => {
        document.getElementById("reportContent").innerHTML +=
            `<tr>
                <td>${r.date || r.payDate}</td><td>${r.belongMonth||"-"}</td><td>${r.type}</td><td>${r.category||"-"}</td>
                <td>${r.channel}</td><td>${r.amount.toFixed(2)}</td><td>${r.operator}</td><td>${r.remark||""}</td>
            </tr>`;
    });
    document.getElementById("reportContent").innerHTML += `</table>`;
    document.getElementById("reportTitle").innerText = m + "月度明细";
    document.getElementById("reportModal").style.display = "block";
}

function genYearReport() {
    const y = document.getElementById("yearInput").value;
    const rent = Number(document.getElementById("yearRent").value)||0;
    const list = records.filter(x => (x.date || x.payDate).startsWith(y));
    let inSum=0, outSum=0;
    list.forEach(r => {
        if (r.type === "转账" || r.isDividend || r.remark?.includes("分红")) return;
        if (r.category?.startsWith("场地支出")) return;
        const finalAmount = r.amount + (r.adjustment || 0);
        r.type === "收入" ? inSum += finalAmount : outSum += finalAmount;
    });
    document.getElementById("reportContent").innerHTML =
        `<h3>${y}年度财报</h3>
        <p>收入：${inSum.toFixed(2)}</p>
        <p>支出(不含场地)：${outSum.toFixed(2)}</p>
        <p>全年租金：${rent.toFixed(2)}</p>
        <p>净利润：${(inSum-outSum-rent).toFixed(2)}</p>`;
    document.getElementById("reportTitle").innerText = y + "年度财报";
    document.getElementById("reportModal").style.display = "block";
}

function closeReport() {
    document.getElementById("reportModal").style.display = "none";
}

function exportRangeRecords() {
    const s = document.getElementById("exportStart").value;
    const e = document.getElementById("exportEnd").value;
    const data = records.filter(x => (x.date || x.payDate) >= s && (x.date || x.payDate) <= e);
    const aoa = [["日期","类型","分类","转出账户","转入账户","金额","操作人","备注"]];
    data.forEach(r => aoa.push([r.date || r.payDate, r.type, r.category||"-", r.channel, r.toChannel||"-", r.amount, r.operator, r.remark]));
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "流水");
    XLSX.writeFile(wb, `流水${s}~${e}.xlsx`);
}

// 新增用户
function showAddUser() { document.getElementById("addUserModal").style.display = "block"; }
function hideAddUser() { document.getElementById("addUserModal").style.display = "none"; }
async function doAddUser() {
    const u = document.getElementById("newUser").value.trim();
    const p = document.getElementById("newPwd").value.trim();
    if (!u || !p) { alert("请输入用户名和密码"); return; }
    const users = await getUsers();
    if (users[u]) { alert("用户已存在"); return; }
    users[u] = p;
    const ok = await saveUsers(users);
    if (ok) { alert("新增成功"); hideAddUser(); }
}

// 导入Excel
async function importExcel(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
        const wb = XLSX.read(ev.target.result, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
        json.shift();
        let count = 0;
        json.forEach(row => {
            if (!row[0] || !row[5]) return;
            const r = {
                payDate: row[0] + "",
                date: row[0] + "",
                type: row[1] || "收入",
                category: row[2] || "",
                channel: row[3] || "支付宝",
                toChannel: row[4] || "",
                amount: Number(row[5]) || 0,
                adjustment: 0,
                operator: currentUser,
                remark: row[7] || "",
                belongMonth: "",
                operateTime: new Date().toLocaleString(),
                isDividend: (row[7] || "").includes("分红")
            };
            if (r.amount <= 0) return;
            records.unshift(r);
            count++;
        });
        await saveData({ records, initialCapital });
        refreshAll();
        alert(`导入成功 ${count} 条数据`);
        document.getElementById("importFile").value = "";
    };
    reader.readAsArrayBuffer(file);
}
</script>
</body>
</html>
