<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务对账系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.8.5/xlsx.full.min.js"></script>
    <style>
        body{font-family:Arial;margin:20px;background:#f5f7fa}
        .container{max-width:1300px;margin:0 auto;background:white;padding:20px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
        h1,h2,h3{color:#333}
        .form-group{margin:15px 0}
        label{display:inline-block;width:120px;font-weight:bold}
        input,select{padding:8px;width:220px;border:1px solid #ddd;border-radius:4px}
        button{padding:8px 16px;background:#007bff;color:white;border:none;border-radius:4px;cursor-pointer;margin-right:5px}
        button:hover{background:#0056b3}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{padding:10px;border:1px solid #ddd;text-align:left}
        th{background:#f8f9fa}
        .summary{background:#e9f7ef;padding:15px;border-radius:4px;margin:20px 0;white-space:pre-line}
        .top-report{position:absolute;top:20px;right:20px;background:white;padding:15px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        .page-btn{margin:10px 5px;padding:6px 12px}
        .bottom-bar{margin-top:40px;padding-top:20px;border-top:1px solid #ddd}
        .user-info{text-align:right;margin-bottom:10px}
    </style>
</head>
<body>
    <div class="user-info">
        欢迎：<span id="userName"></span>
        <button onclick="logout()">退出登录</button>
    </div>

    <div id="reportModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;">
        <div style="background:white;margin:5% auto;padding:20px;width:80%;max-width:1000px;border-radius:8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <h2 id="reportTitle"></h2>
                <div>
                    <button onclick="exportCurrentReport()">导出Excel</button>
                    <button onclick="closeReport()">关闭</button>
                </div>
            </div>
            <div id="reportContent" style="max-height:600px;overflow:auto;"></div>
        </div>
    </div>

    <div class="top-report">
        <h3>财务报表</h3>
        <div class="form-group">
            <label>月份：</label>
            <input type="month" id="monthQuery" style="width:140px">
            <button onclick="showMonthDetail()">月度明细</button>
        </div>
        <div class="form-group">
            <label>年份：</label>
            <input type="number" id="yearInput" placeholder="2025" style="width:70px">
            <input type="number" id="yearRent" placeholder="全年租金" style="width:120px">
            <button onclick="genYearReport()">年度财报</button>
        </div>
    </div>

    <div class="container">
        <h1>财务对账系统</h1>
        <div class="summary" id="capitalProgress" style="font-size:16px;"></div>

        <h2>数据录入</h2>
        <div class="form-group"><label>日期：</label><input type="date" id="payDate" required></div>
        <div class="form-group">
            <label>类型：</label>
            <select id="recordType" onchange="refreshForm()">
                <option value="收入">收入</option><option value="支出">支出</option><option value="转账">转账</option>
            </select>
        </div>
        <div class="form-group" id="expenseTypeGroup" style="display:none;">
            <label>支出大类：</label>
            <select id="expenseMain" onchange="refreshSubCategory()">
                <option value="人事支出">人事支出</option><option value="市场支出">市场支出</option>
                <option value="行政支出">行政支出</option><option value="管理支出">管理支出</option>
                <option value="场地支出">场地支出</option><option value="财务支出">财务支出</option>
                <option value="预付款">预付款</option>
            </select>
            <label style="width:80px;">小类：</label><select id="expenseSub"></select>
        </div>
        <div class="form-group" id="belongMonthGroup" style="display:none;">
            <label>归属月份：</label><input type="month" id="belongMonth">
        </div>
        <div class="form-group"><label>支付/转出：</label>
            <select id="channel">
                <option value="支付宝">支付宝</option><option value="微信">微信</option>
                <option value="兴业银行">兴业银行</option><option value="公司账户">公司账户</option>
            </select>
        </div>
        <div class="form-group" id="toChannelGroup" style="display:none;">
            <label>转入账户：</label>
            <select id="toChannel">
                <option value="支付宝">支付宝</option><option value="微信">微信</option>
                <option value="兴业银行">兴业银行</option><option value="公司账户">公司账户</option>
            </select>
        </div>
        <div class="form-group"><label>金额：</label><input type="number" id="amount" step="0.01" required></div>
        <div class="form-group"><label>备注：</label><input type="text" id="remark" placeholder=""></div>
        <button id="addBtn" onclick="addRecord()" disabled>保存</button>

        <h2>查询对账</h2>
        <div class="form-group">
            <label>查询日期：</label><input type="date" id="queryDate">
            <button onclick="queryDaily()">当日对账汇总</button>
            <button onclick="queryBalance()">当日账户余额</button>
        </div>
        <div class="summary" id="summaryResult"></div>

        <h2>流水记录</h2>
        <div id="pageNav"></div>
        <table>
            <thead>
                <tr>
                    <th>日期</th><th>类型</th><th>分类</th><th>账户</th><th>转入</th><th>金额</th><th>操作人</th>
                    <th id="opTimeHeader" style="display:none;">操作时间</th><th>备注</th>
                </tr>
            </thead>
            <tbody id="recordBody"></tbody>
        </table>

        <div class="bottom-bar">
            <div class="form-group">
                <label>导出区间：</label>
                <input type="date" id="exportStart"> ~ <input type="date" id="exportEnd">
                <button onclick="exportRangeRecords()" style="background:#17a2b8;">导出流水Excel</button>
            </div>
            <button onclick="showEditInitial()" style="background:#28a745;">修改初始投入</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem("user");
        let records = JSON.parse(localStorage.getItem('financeRecords')) || [];
        let initialCapital = parseFloat(localStorage.getItem('initialCapital')) || 0;
        let pageSize = 20;
        let currentPage = 1;

        const expenseCategories = {
            "人事支出":["薪资-基本薪酬","薪资-业绩奖励","团建","培训","招聘"],
            "市场支出":["网络","渠道","地推","物资制作","人员工资"],
            "行政支出":["办公用品","耗材","修缮","通讯","报销"],
            "管理支出":["管理费","教学用品","活动","招生费"],
            "场地支出":["场地租金","后勤","修缮"],
            "财务支出":["税费","手续费"],
            "预付款":["场地预付","广告预付"]
        };

        window.onload = () => {
            if(!currentUser){location.href='index.html';return;}
            document.getElementById('userName').innerText = currentUser;
            if(currentUser==='admin') document.getElementById('opTimeHeader').style.display='table-cell';
            refreshAll();
        };

        function logout(){localStorage.clear();location.href='index.html';}
        function refreshForm(){
            let type=document.getElementById('recordType').value;
            let main=document.getElementById('expenseMain')?.value||'';
            document.getElementById('expenseTypeGroup').style.display=type==='支出'?'block':'none';
            document.getElementById('belongMonthGroup').style.display=(type==='支出'&&main==='人事支出')?'block':'none';
            document.getElementById('toChannelGroup').style.display=type==='转账'?'block':'none';
            if(type==='支出')refreshSubCategory();
        }
        function refreshSubCategory(){
            let main=document.getElementById('expenseMain').value;
            let sub=document.getElementById('expenseSub');sub.innerHTML='';
            if(!expenseCategories[main])return;
            expenseCategories[main].forEach(s=>{
                let opt=document.createElement('option');opt.value=s;opt.innerText=s;sub.appendChild(opt);
            });
        }
        function showEditInitial(){
            let v=prompt("修改初始投入",initialCapital);
            if(v===null)return;
            initialCapital=parseFloat(v)||0;
            localStorage.setItem('initialCapital',initialCapital);
            refreshAll();
        }
        function refreshAll(){renderPage();updateProgress();}
        function isDividendRecord(r){return r.remark&&r.remark.includes("分红");}
        function updateProgress(){
            let profit=0;
            records.forEach(r=>{
                if(r.type==='转账')return;if(isDividendRecord(r))return;
                let real=r.type==='收入'?r.amount:-r.amount;profit+=real;
            });
            let pct=initialCapital>0?Math.min(100,Math.max(0,(profit/initialCapital*100))):0;
            document.getElementById('capitalProgress').innerText=
                `初始投入：${initialCapital.toFixed(2)} 元 | 累计经营利润：${profit.toFixed(2)} 元 | 回本进度：${pct.toFixed(1)}%`;
        }
        function addRecord(){
            if(!currentUser){alert('请先登录');return;}
            let date=document.getElementById('payDate').value;
            let type=document.getElementById('recordType').value;
            let amount=document.getElementById('amount').value;
            if(!date){alert('请选择日期！');return;}
            if(!amount||amount<=0){alert('请输入正确金额！');return;}
            if(type==='支出'&&!document.getElementById('expenseSub').value){alert('支出必须选择大类+小类！');return;}
            let main=document.getElementById('expenseMain')?.value||'';
            let sub=document.getElementById('expenseSub')?.value||'';
            let category=type==='支出'?`${main}-${sub}`:'';
            let r={
                date:date,type:type,category:category,
                belongMonth:document.getElementById('belongMonth').value||'',
                channel:document.getElementById('channel').value,
                toChannel:document.getElementById('toChannel')?.value||'',
                amount:parseFloat(amount)||0,
                remark:document.getElementById('remark').value,
                operator:currentUser,operateTime:new Date().toLocaleString()
            };
            records.unshift(r);localStorage.setItem('financeRecords',JSON.stringify(records));
            refreshAll();alert('保存成功');
        }
        function renderPage(){
            let totalPage=Math.ceil(records.length/pageSize);
            let start=(currentPage-1)*pageSize;
            let data=records.slice(start,start+pageSize);
            renderList(data);
            let nav=document.getElementById('pageNav');nav.innerHTML='';
            if(currentPage>1){let b=document.createElement('button');b.className='page-btn';b.innerText='上一页';b.onclick=()=>{currentPage--;renderPage();};nav.appendChild(b);}
            if(currentPage<totalPage){let b=document.createElement('button');b.className='page-btn';b.innerText='下一页';b.onclick=()=>{currentPage++;renderPage();};nav.appendChild(b);}
        }
        function renderList(data){
            let b=document.getElementById('recordBody');b.innerHTML='';
            data.forEach(r=>{
                let op=currentUser==='admin'?`<td>${r.operateTime||'-'}</td>`:'';
                b.innerHTML+=`<tr><td>${r.date}</td><td>${r.type}</td><td>${r.category||'-'}</td><td>${r.channel}</td><td>${r.toChannel||'-'}</td><td>${r.amount.toFixed(2)}</td><td>${r.operator}</td>${op}<td>${r.remark}</td></tr>`;
            });
        }
        function queryDaily(){
            let d=document.getElementById('queryDate').value;
            if(!d){alert('请选择日期');return;}
            let list=records.filter(x=>x.date===d);
            let income=0,expense=0;
            list.forEach(r=>{if(r.type==='转账'||isDividendRecord(r))return;r.type==='收入'?income+=r.amount:expense+=r.amount;});
            document.getElementById('summaryResult').innerText=`${d} 当日对账汇总\n收入：${income.toFixed(2)}\n支出：${expense.toFixed(2)}\n净额：${(income-expense).toFixed(2)}`;
        }
        function queryBalance(){
            let d=document.getElementById('queryDate').value;
            if(!d){alert('请选择日期');return;}
            let list=records.filter(x=>x.date<=d);
            let bal={支付宝:0,微信:0,兴业银行:0,公司账户:0};
            list.forEach(r=>{
                if(r.type==='收入')bal[r.channel]+=r.amount;
                else if(r.type==='支出')bal[r.channel]-=r.amount;
                else if(r.type==='转账'){bal[r.channel]-=r.amount;bal[r.toChannel]+=r.amount;}
            });
            let total=bal.支付宝+bal.微信+bal.兴业银行+bal.公司账户;
            document.getElementById('summaryResult').innerText=`截至 ${d}\n支付宝：${bal.支付宝.toFixed(2)}\n微信：${bal.微信.toFixed(2)}\n兴业银行：${bal.兴业银行.toFixed(2)}\n公司账户：${bal.公司账户.toFixed(2)}\n————————————\n总余额：${total.toFixed(2)}`;
        }
        function showMonthDetail(){
            let m=document.getElementById('monthQuery').value;
            if(!m){alert('请选择月份');return;}
            let list=records.filter(x=>{if(x.belongMonth)return x.belongMonth===m;else return x.date&&x.date.startsWith(m);});
            let income=0,expense=0;
            list.forEach(r=>{if(isDividendRecord(r)||r.type==='转账')return;let f=r.type==='收入'?r.amount:-r.amount;r.type==='收入'?income+=f:expense+=Math.abs(f);});
            let html=`<h3>${m} 月度明细</h3><p>收入：${income.toFixed(2)}</p><p>支出：${expense.toFixed(2)}</p><p>净利：${(income-expense).toFixed(2)}</p>
<table border=1 cellpadding=5 width=100% style="border-collapse:collapse"><tr bgcolor=#eee>
<th>日期</th><th>归属月</th><th>类型</th><th>分类</th><th>渠道</th><th>金额</th><th>最终</th><th>操作人</th><th>备注</th></tr>`;
            list.forEach(r=>{let f=r.type==='收入'?r.amount:-r.amount;html+=`<tr><td>${r.date||'-'}</td><td>${r.belongMonth||'-'}</td><td>${r.type}</td><td>${r.category||'-'}</td><td>${r.channel}</td><td>${r.amount.toFixed(2)}</td><td>${f.toFixed(2)}</td><td>${r.operator}</td><td>${r.remark||''}</td></tr>`;});
            html+=`</table>`;
            document.getElementById('reportContent').innerHTML=html;
            document.getElementById('reportTitle').innerText=m+"月度明细";
            document.getElementById('reportModal').style.display="block";
        }
        function genYearReport(){
            let y=document.getElementById('yearInput').value;
            if(!y){alert('请输入年份');return;}
            let list=records.filter(x=>x.date.startsWith(y));
            let income=0,expense=0;
            list.forEach(r=>{
                if(r.type==='转账'||isDividendRecord(r))return;
                if(r.category&&r.category.startsWith('场地支出'))return;
                r.type==='收入'?income+=r.amount:expense+=r.amount;
            });
            let rent=parseFloat(document.getElementById('yearRent').value)||0;
            document.getElementById('reportContent').innerHTML=`<h3>${y}年度财报</h3><p>收入：${income.toFixed(2)}</p><p>支出（不含场地）：${expense.toFixed(2)}</p><p>全年租金：${rent.toFixed(2)}</p><p>净利润：${(income-expense-rent).toFixed(2)}</p>`;
            document.getElementById('reportTitle').innerText=y+"年度财报";
            document.getElementById('reportModal').style.display="block";
        }
        function closeReport(){document.getElementById('reportModal').style.display="none";}
        function exportRangeRecords(){
            let s=document.getElementById('exportStart').value;
            let e=document.getElementById('exportEnd').value;
            if(!s||!e){alert('请选择开始和结束日期');return;}
            let data=records.filter(x=>x.date>=s&&x.date<=e);
            let headers=["日期","类型","分类","转出账户","转入账户","金额","操作人","备注"];
            if(currentUser==='admin')headers.push("操作时间");
            let out=[headers];
            data.forEach(r=>{
                let row=[r.date,r.type,r.category||'-',r.channel,r.toChannel||'-',r.amount.toFixed(2),r.operator,r.remark];
                if(currentUser==='admin')row.push(r.operateTime||'-');
                out.push(row);
            });
            let ws=XLSX.utils.aoa_to_sheet(out);
            let wb=XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb,ws,"流水");
            XLSX.writeFile(wb,`流水_${s}_${e}.xlsx`);
        }
        function exportCurrentReport(){}
    </script>
</body>
</html>
